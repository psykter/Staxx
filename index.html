<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAXX - Get an Estimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">

    <!-- Page content (optional - you can delete this if you only want the widget) -->
    <div class="flex items-center justify-center min-h-screen p-6">
        <div class="text-center">
            <h1 class="text-5xl font-bold mb-4">Get an Estimate</h1>
            <p class="text-emerald-300 text-xl mb-10">Tell us about your Dallas construction project.</p>
            <button onclick="openQuoteModal()" class="bg-emerald-500 hover:bg-emerald-600 text-slate-900 font-bold text-2xl px-14 py-7 rounded-3xl flex items-center gap-4 mx-auto">
                <i class="fa-solid fa-rocket"></i>
                START YOUR ESTIMATE
            </button>
        </div>
    </div>

    <!-- THE FULL WIDGET MODAL -->
    <div id="quoteModal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[99999] p-4">
        <div class="bg-[#0f172a] rounded-3xl max-w-4xl w-full max-h-[95vh] overflow-hidden flex flex-col">
            <div class="px-8 pt-6 pb-4 border-b border-emerald-500/30 flex justify-between items-center">
                <h3 class="text-3xl font-bold">Get Your Estimate</h3>
                <button onclick="closeQuoteModal()" class="text-5xl leading-none text-emerald-400 hover:text-white">×</button>
            </div>

            <div class="flex-1 overflow-auto p-8" id="wizardContent"></div>

            <div class="px-8 py-6 border-t border-emerald-500/30 flex items-center justify-between bg-[#0f172a]">
                <button onclick="prevStep()" id="btnBack" class="px-8 py-4 text-lg font-medium border border-emerald-500/50 hover:border-emerald-500 rounded-2xl">BACK</button>
                <div class="text-right">
                    <div class="text-sm text-emerald-400">ESTIMATED DEPOSIT</div>
                    <div id="liveTotal" class="text-4xl font-bold text-emerald-500">$0</div>
                </div>
                <button onclick="nextStep()" id="btnNext" class="px-10 py-4 bg-emerald-500 hover:bg-emerald-600 text-slate-900 font-bold text-lg rounded-2xl">NEXT</button>
            </div>
        </div>
    </div>

    <script>
        function initTailwind() {
            return { config(userConfig = {}) { return { content: [], theme: { extend: {} }, plugins: [], ...userConfig } } };
        }
        document.documentElement.setAttribute('data-tailwind-config', JSON.stringify(initTailwind()));

        let currentStep = 1;
        let selectedService = null;
        let selectedAddons = [];
        let insuranceSelected = false;
        let deliveryDate = '';
        let deliveryTime = '';
        let instructions = '';

        const services = [
            { id: "kitchen", name: "Kitchen Remodel", deposit: 8500 },
            { id: "bathroom", name: "Bathroom Renovation", deposit: 4200 },
            { id: "newhome", name: "New Home Construction", deposit: 25000 },
            { id: "concrete", name: "Concrete Driveway", deposit: 3800 },
            { id: "roofing", name: "Roofing & Additions", deposit: 6900 },
            { id: "commercial", name: "Commercial Construction", deposit: 0 }
        ];

        function calculateTotal() {
            let total = selectedService ? selectedService.deposit : 0;
            if (insuranceSelected) total += 150;
            selectedAddons.forEach(a => total += a.price);
            return total;
        }

        function updateLiveTotal() {
            document.getElementById('liveTotal').textContent = `$${calculateTotal()}`;
        }

        function renderStep() {
            const content = document.getElementById('wizardContent');
            let html = '';

            if (currentStep === 1) {
                html = `
                    <div class="text-center mb-8"><h2 class="text-4xl font-bold">What service do you need?</h2></div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        ${services.map(s => `
                            <div onclick="selectService('${s.id}')" class="cursor-pointer p-6 border-2 rounded-3xl transition-all ${selectedService && selectedService.id === s.id ? 'border-emerald-500 bg-emerald-500/10' : 'border-transparent hover:border-emerald-500/50'}">
                                <div class="font-bold text-xl">${s.name}</div>
                                <div class="text-3xl font-bold text-emerald-400">$${s.deposit}<span class="text-base font-normal text-white"> deposit</span></div>
                            </div>
                        `).join('')}
                    </div>`;
            } else if (currentStep === 2) {
                html = `
                    <h2 class="text-4xl font-bold mb-8">Add-ons &amp; Details</h2>
                    <div class="space-y-8">
                        <label onclick="toggleInsurance(this)" class="cursor-pointer flex items-center gap-4 p-6 border border-emerald-500/30 hover:border-emerald-500 rounded-3xl">
                            <input type="checkbox" ${insuranceSelected ? 'checked' : ''} class="w-6 h-6 accent-emerald-500">
                            <div class="flex-1">
                                <div class="font-medium">Purchase Project Insurance</div>
                                <div class="text-emerald-400">Protects your project • +$150</div>
                            </div>
                        </label>
                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm mb-2">Preferred Start Date</label>
                                <input type="date" value="${deliveryDate}" onchange="deliveryDate = this.value" class="w-full bg-black border border-emerald-500/50 rounded-2xl px-5 py-4">
                            </div>
                            <div>
                                <label class="block text-sm mb-2">Preferred Time</label>
                                <input type="time" value="${deliveryTime}" onchange="deliveryTime = this.value" class="w-full bg-black border border-emerald-500/50 rounded-2xl px-5 py-4">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm mb-2">Additional Notes (optional)</label>
                            <textarea rows="4" placeholder="Project details, address, etc..." oninput="instructions = this.value" class="w-full bg-black border border-emerald-500/50 rounded-3xl px-5 py-4">${instructions}</textarea>
                        </div>
                    </div>`;
            } else if (currentStep === 3) {
                html = `
                    <h2 class="text-4xl font-bold mb-8">Your Contact Information</h2>
                    <div class="grid grid-cols-2 gap-6">
                        <div><label class="block text-sm mb-2">Name</label><input type="text" id="name" class="w-full bg-black border border-emerald-500/50 rounded-2xl px-5 py-4"></div>
                        <div><label class="block text-sm mb-2">Phone</label><input type="tel" id="phone" class="w-full bg-black border border-emerald-500/50 rounded-2xl px-5 py-4"></div>
                        <div class="col-span-2"><label class="block text-sm mb-2">Email</label><input type="email" id="email" class="w-full bg-black border border-emerald-500/50 rounded-2xl px-5 py-4"></div>
                    </div>`;
            }
            content.innerHTML = html;
            updateLiveTotal();
        }

        function selectService(id) {
            selectedService = services.find(s => s.id === id);
            nextStep();
        }

        function toggleInsurance(label) {
            const checkbox = label.querySelector('input');
            checkbox.checked = !checkbox.checked;
            insuranceSelected = checkbox.checked;
            updateLiveTotal();
        }

        function nextStep() {
            if (currentStep < 3) {
                currentStep++;
                renderStep();
            } else {
                handleFinalSubmit();
            }
        }

        function prevStep() {
            if (currentStep > 1) {
                currentStep--;
                renderStep();
            }
        }

        function handleFinalSubmit() {
            const now = new Date();
            const dateStr = now.getFullYear().toString() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0');
            const random = Math.floor(1000 + Math.random() * 9000);
            const confirmationNumber = `STX-${dateStr}-${random}`;

            alert(`✅ Estimate request received!\n\nConfirmation Number: ${confirmationNumber}\n\nOur team will contact you within 24 hours.\n\nThank you for choosing STAXX Construction!`);
            closeQuoteModal();
        }

        function openQuoteModal() {
            document.getElementById('quoteModal').classList.remove('hidden');
            document.getElementById('quoteModal').classList.add('flex');
            currentStep = 1;
            selectedService = null;
            selectedAddons = [];
            insuranceSelected = false;
            renderStep();
        }

        function closeQuoteModal() {
            const modal = document.getElementById('quoteModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        window.onload = () => {
            console.log('%cSTAXX Get an Estimate Widget Ready', 'color:#10b981; font-weight:bold');
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAXX - Get an Estimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-6">

    <div class="text-center max-w-lg">
        <h1 class="text-5xl font-bold tracking-tight mb-4">Get an Estimate</h1>
        <p class="text-emerald-300 text-xl mb-10">Tell us about your Dallas construction project — we’ll give you a fast, accurate quote.</p>
        <button onclick="openQuoteModal()" class="bg-emerald-500 hover:bg-emerald-600 text-slate-900 font-bold text-2xl px-14 py-7 rounded-3xl flex items-center gap-4 mx-auto transition-all">
            <i class="fa-solid fa-rocket"></i>
            START YOUR ESTIMATE
        </button>
    </div>

    <!-- THE EXACT MODAL LOOK YOU WANTED -->
    <div id="quoteModal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[99999] p-4">
        <div class="bg-[#1a1a1a] rounded-3xl max-w-4xl w-full max-h-[95vh] overflow-hidden flex flex-col shadow-2xl">

            <!-- HEADER + PROGRESS -->
            <div class="px-8 pt-6 pb-4 border-b border-emerald-500/30">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-3xl font-bold">Build Your Order</h3>
                    <button onclick="closeQuoteModal()" class="text-5xl leading-none text-emerald-400 hover:text-white">×</button>
                </div>

                <div class="flex justify-between text-xs font-medium text-emerald-400 mb-2">
                    <div id="stepTitle" class="font-bold">STEP 1 OF 4 • CHOOSE CATEGORY</div>
                    <div class="flex gap-1" id="progressDots"></div>
                </div>
            </div>

            <div class="flex-1 overflow-auto p-8" id="wizardContent"></div>

            <!-- FOOTER -->
            <div class="px-8 py-6 border-t border-emerald-500/30 flex items-center justify-between bg-[#1a1a1a]">
                <button onclick="prevStep()" id="btnBack" class="px-8 py-4 text-lg font-medium border border-emerald-500/50 hover:border-emerald-500 rounded-2xl transition">BACK</button>
                
                <div class="text-right">
                    <div class="text-sm text-emerald-400">ESTIMATED DEPOSIT</div>
                    <div id="liveTotal" class="text-4xl font-bold text-emerald-500">$0</div>
                </div>
                
                <button onclick="nextStep()" id="btnNext" class="px-10 py-4 bg-emerald-500 hover:bg-emerald-600 text-slate-900 font-bold text-lg rounded-2xl transition">NEXT</button>
            </div>
        </div>
    </div>

    <script>
        function initTailwind() {
            return { config(userConfig = {}) { return { content: [], theme: { extend: {} }, plugins: [], ...userConfig } } };
        }
        document.documentElement.setAttribute('data-tailwind-config', JSON.stringify(initTailwind()));

        let currentStep = 1;
        let selectedCategory = null;
        let selectedProduct = null;
        let selectedAddons = [];
        let insuranceSelected = false;
        let deliveryDate = '';
        let deliveryTime = '';
        let instructions = '';

        const categories = [
            { id: "rent", name: "RENT", subtitle: "$125–$225 / mo", desc: "Fast delivery • Flexible terms" },
            { id: "buy",  name: "BUY",  subtitle: "$2,800–$4,900", desc: "Own it forever • Best value" },
            { id: "convert", name: "CONVERT", subtitle: "$6,800–$18,500", desc: "Turnkey solutions • Fully built" }
        ];

        const productsByCategory = {
            rent: [
                { id:1, name:"20ft Standard", price:125, unit:"mo" },
                { id:2, name:"40ft Standard", price:195, unit:"mo" },
                { id:3, name:"40ft High Cube", price:225, unit:"mo" }
            ],
            buy: [
                { id:4, name:"20ft Standard", price:2800, unit:"one-time" },
                { id:5, name:"40ft Standard", price:4200, unit:"one-time" },
                { id:6, name:"40ft High Cube", price:4900, unit:"one-time" }
            ],
            convert: [
                { id:7, name:"Tiny Home Package", price:18500, unit:"project" },
                { id:8, name:"Job Site Office", price:9900, unit:"project" },
                { id:9, name:"Workshop / Garage", price:6800, unit:"project" }
            ]
        };

        const addonsList = [
            { id:1, name:"Full Insulation", price:1200 },
            { id:2, name:"Electrical Package", price:950 },
            { id:3, name:"HVAC System", price:2500 },
            { id:4, name:"Roll-up Door", price:850 },
            { id:5, name:"Windows + Security Bars", price:650 },
            { id:6, name:"Interior Lighting & Outlets", price:450 }
        ];

        function calculateTotal() {
            let total = selectedProduct ? selectedProduct.price : 0;
            if (insuranceSelected) total += 150;
            selectedAddons.forEach(a => total += a.price);
            return total;
        }

        function updateLiveTotal() {
            document.getElementById('liveTotal').textContent = `$${calculateTotal()}`;
        }

        function updateProgress() {
            const titleEl = document.getElementById('stepTitle');
            const dotsContainer = document.getElementById('progressDots');
            dotsContainer.innerHTML = '';

            const titles = [
                "STEP 1 OF 4 • CHOOSE CATEGORY",
                "STEP 2 OF 4 • CHOOSE PRODUCT",
                "STEP 3 OF 4 • RENTAL DETAILS / ADD-ONS",
                "STEP 4 OF 4 • YOUR DETAILS"
            ];
            titleEl.textContent = titles[currentStep - 1];

            for (let i = 1; i <= 4; i++) {
                const dot = document.createElement('div');
                dot.className = `w-6 h-1.5 rounded-full cursor-pointer transition-all ${i === currentStep ? 'bg-emerald-500' : 'bg-white/30'}`;
                dot.onclick = () => { currentStep = i; renderStep(); };
                dotsContainer.appendChild(dot);
            }
        }

        function renderStep() {
            const content = document.getElementById('wizardContent');
            let html = '';

            if (currentStep === 1) {
                html = `
                    <div class="text-center mb-8"><h2 class="text-4xl font-bold">Choose Your Category</h2></div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        ${categories.map(cat => `
                            <div onclick="selectCategory('${cat.id}')" class="cursor-pointer p-8 border-2 rounded-3xl text-center transition-all hover:border-emerald-500 ${selectedCategory === cat.id ? 'border-emerald-500 bg-emerald-500/10' : 'border-transparent'}">
                                <div class="text-5xl font-bold mb-2">${cat.name}</div>
                                <div class="text-2xl text-emerald-400">${cat.subtitle}</div>
                                <div class="text-slate-400 mt-6">${cat.desc}</div>
                            </div>
                        `).join('')}
                    </div>`;
            } else if (currentStep === 2) {
                const prods = productsByCategory[selectedCategory] || [];
                html = `
                    <h2 class="text-4xl font-bold mb-8">Choose Your ${selectedCategory.toUpperCase()} Option</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        ${prods.map(p => `
                            <div onclick="selectProduct(${p.id})" class="cursor-pointer p-6 border-2 rounded-3xl transition-all ${selectedProduct && selectedProduct.id === p.id ? 'border-emerald-500 bg-emerald-500/10' : 'border-transparent hover:border-emerald-500/50'}">
                                <div class="font-bold text-xl">${p.name}</div>
                                <div class="text-4xl font-bold text-emerald-400">$${p.price}<span class="text-base font-normal">/${p.unit}</span></div>
                            </div>
                        `).join('')}
                    </div>`;
            } else if (currentStep === 3) {
                if (selectedCategory === 'rent') {
                    html = `
                        <h2 class="text-4xl font-bold mb-8">Rental Details</h2>
                        <div class="space-y-8">
                            <label onclick="toggleInsurance(this)" class="cursor-pointer flex items-center gap-4 p-6 border border-emerald-500/30 hover:border-emerald-500 rounded-3xl">
                                <input type="checkbox" id="insuranceCheck" ${insuranceSelected ? 'checked' : ''} class="w-6 h-6 accent-emerald-500">
                                <div class="flex-1">
                                    <div class="font-medium">Purchase Rental Insurance</div>
                                    <div class="text-emerald-400">Protects you during the rental period • +$150</div>
                                </div>
                            </label>
                            <div class="grid grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-sm mb-2">Preferred Delivery Date</label>
                                    <input type="date" id="deliveryDateInput" value="${deliveryDate}" onchange="deliveryDate = this.value; updateLiveTotal()" class="w-full bg-black border border-emerald-500/50 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-500">
                                </div>
                                <div>
                                    <label class="block text-sm mb-2">Preferred Delivery Time</label>
                                    <input type="time" id="deliveryTimeInput" value="${deliveryTime}" onchange="deliveryTime = this.value; updateLiveTotal()" class="w-full bg-black border border-emerald-500/50 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-500">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm mb-2">Additional Instructions / Delivery Notes (optional)</label>
                                <textarea id="instructionsInput" rows="4" placeholder="Gate code, special instructions, etc..." oninput="instructions = this.value" class="w-full bg-black border border-emerald-500/50 rounded-3xl px-5 py-4 focus:outline-none focus:border-emerald-500">${instructions}</textarea>
                            </div>
                        </div>`;
                } else {
                    html = `
                        <h2 class="text-4xl font-bold mb-8">Add-ons &amp; Upgrades</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            ${addonsList.map(addon => `
                                <label onclick="toggleAddon(${addon.id}, this)" class="cursor-pointer flex items-center gap-4 p-5 border border-emerald-500/30 hover:border-emerald-500 rounded-3xl">
                                    <input type="checkbox" class="w-6 h-6 accent-emerald-500">
                                    <div class="flex-1">
                                        <div>${addon.name}</div>
                                        <div class="text-emerald-400">+$${addon.price}</div>
                                    </div>
                                </label>
                            `).join('')}
                        </div>`;
                }
            } else if (currentStep === 4) {
                html = `
                    <h2 class="text-4xl font-bold mb-8">Your Order Summary</h2>
                    <div id="summaryContent" class="bg-black p-6 rounded-3xl mb-8"></div>
                    
                    <div class="grid grid-cols-2 gap-6">
                        <div><label class="block text-sm mb-2">Name</label><input type="text" id="name" class="w-full bg-black border border-emerald-500/50 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-500" placeholder="John Doe"></div>
                        <div><label class="block text-sm mb-2">Phone</label><input type="tel" id="phone" class="w-full bg-black border border-emerald-500/50 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-500" placeholder="(214) 555-0123"></div>
                        <div class="col-span-2"><label class="block text-sm mb-2">Email</label><input type="email" id="email" class="w-full bg-black border border-emerald-500/50 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-500" placeholder="you@email.com"></div>
                        <div class="col-span-2"><label class="block text-sm mb-2">Notes / Delivery Address</label><textarea id="notes" rows="4" class="w-full bg-black border border-emerald-500/50 rounded-3xl px-5 py-4 focus:outline-none focus:border-emerald-500" placeholder="Delivery address, timeline, or special requests..."></textarea></div>
                    </div>

                    <button onclick="payWithStripe()" class="mt-8 w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white font-bold text-2xl py-8 rounded-3xl flex items-center justify-center gap-4 transition">
                        <i class="fa-solid fa-lock"></i> PAY DEPOSIT SECURELY WITH STRIPE
                    </button>

                    <button onclick="handleFinalSubmit()" class="mt-4 w-full text-emerald-400 border border-emerald-500/50 hover:bg-emerald-500/10 py-6 rounded-3xl text-lg font-medium">
                        Just send me a quote (no payment yet)
                    </button>`;
            }
            content.innerHTML = html;
            updateProgress();
            updateLiveTotal();
            if (currentStep === 4) renderFinalSummary();
        }

        function renderFinalSummary() {
            const container = document.getElementById('summaryContent');
            let html = `<div class="space-y-4">`;
            if (selectedProduct) html += `<div class="flex justify-between"><span>${selectedProduct.name}</span><span class="font-bold">$${selectedProduct.price}</span></div>`;
            selectedAddons.forEach(a => {
                html += `<div class="flex justify-between text-sm"><span>${a.name}</span><span>+$${a.price}</span></div>`;
            });
            if (insuranceSelected) html += `<div class="flex justify-between text-sm"><span>Rental Insurance</span><span>+150</span></div>`;
            html += `</div>`;
            container.innerHTML = html;
        }

        function selectCategory(cat) {
            selectedCategory = cat;
            selectedProduct = null;
            selectedAddons = [];
            nextStep();
        }

        function selectProduct(id) {
            const allProducts = [...productsByCategory.rent, ...productsByCategory.buy, ...productsByCategory.convert];
            selectedProduct = allProducts.find(p => p.id === id);
            nextStep();
        }

        function toggleAddon(id, label) {
            const checkbox = label.querySelector('input');
            checkbox.checked = !checkbox.checked;
            const addon = addonsList.find(a => a.id === id);
            if (checkbox.checked) selectedAddons.push(addon);
            else selectedAddons = selectedAddons.filter(a => a.id !== id);
            updateLiveTotal();
        }

        function toggleInsurance(label) {
            const checkbox = label.querySelector('input');
            checkbox.checked = !checkbox.checked;
            insuranceSelected = checkbox.checked;
            updateLiveTotal();
        }

        function nextStep() {
            if (currentStep < 4) {
                currentStep++;
                renderStep();
            } else {
                handleFinalSubmit();
            }
        }

        function prevStep() {
            if (currentStep > 1) {
                currentStep--;
                renderStep();
            }
        }

        function payWithStripe() {
            alert("Stripe ready — replace the links in the code with your real Stripe Payment Links.");
            // Add your real links here when you have them
        }

        function handleFinalSubmit() {
            const now = new Date();
            const dateStr = now.getFullYear().toString() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0');
            const random = Math.floor(1000 + Math.random() * 9000);
            const confirmationNumber = `STX-${dateStr}-${random}`;

            alert(`✅ Order received!\n\nConfirmation Number: ${confirmationNumber}\n\nOur team will contact you within 24 hours.\n\nThank you for choosing STAXX Construction!`);
            closeQuoteModal();
        }

        function openQuoteModal() {
            document.getElementById('quoteModal').classList.remove('hidden');
            document.getElementById('quoteModal').classList.add('flex');
            currentStep = 1;
            selectedCategory = null;
            selectedProduct = null;
            selectedAddons = [];
            insuranceSelected = false;
            deliveryDate = '';
            deliveryTime = '';
            instructions = '';
            renderStep();
        }

        function closeQuoteModal() {
            const modal = document.getElementById('quoteModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        window.onload = () => {
            console.log('%cSTAXX Get an Estimate Widget Loaded', 'color:#10b981; font-weight:bold');
        };
    </script>
</body>
</html>
